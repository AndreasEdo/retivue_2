<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - RetiVue</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-container": "#cad6ff",
                        "surface-container-low": "#f2f4f6",
                        "secondary-fixed-dim": "#bac5ee",
                        "on-primary-fixed-variant": "#1328d1",

                        "on-tertiary-fixed": "#25005a",

                        "surface": "#FFFFFF",
                        "tertiary-fixed-dim": "#d2bbff",
                        "tertiary-fixed": "#eaddff",
                        "background": "#f7f9fb",
                        "surface-variant": "#e0e3e5",
                        "primary": "#001bca",
                        "surface-dim": "#d8dadc",
                        "surface-tint": "#3748e7",
                        "surface-bright": "#f7f9fb",
                        "on-primary-container": "#c5c9ff",
                        "surface-container-high": "#e6e8ea",
                        "on-primary-fixed": "#000865",
                        "surface-container": "#eceef0",
                        "on-secondary-fixed-variant": "#3a4667",
                        "on-background": "#191c1e",
                        "on-secondary-fixed": "#0d1a39",
                        "on-surface-variant": "#454655",
                        "primary-fixed": "#dfe0ff",
                        "primary-container": "#2d3fe0",
                        "error-container": "#ffdad6",
                        "tertiary": "#5200b5",
                        "tertiary-container": "#6c22dd",
                        "status-warning": "#D97706",
                        "on-tertiary": "#ffffff",
                        "surface-container-highest": "#e0e3e5",
                        "ai-accent": "#7C3AED",
                        "on-tertiary-container": "#d8c4ff",
                        "error": "#ba1a1a",
                        "inverse-surface": "#2d3133",
                        "outline": "#757687",
                        "text-muted": "#64748B",
                        "inverse-on-surface": "#eff1f3",
                        "on-error": "#ffffff",
                        "status-danger": "#DC2626",
                        "on-secondary-container": "#515c7f",
                        "primary-fixed-dim": "#bdc2ff",
                        "status-success": "#059669",
                        "on-primary": "#ffffff",
                        "secondary": "#525d80",
                        "outline-variant": "#c5c5d8",
                        "on-surface": "#191c1e",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed-variant": "#5a00c6",
                        "surface-container-lowest": "#ffffff",
                        "text-primary": "#0F172A",
                        "on-secondary": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-dense": "8px",
                        "stack-spacious": "24px",
                        "margin-mobile": "16px",
                        "gutter": "24px",
                        "sidebar-width": "260px",
                        "sidebar-collapsed": "72px",
                        "container-max": "1440px",
                        "margin-desktop": "32px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "label-caps": ["Inter"],
                        "headline-lg": ["Inter"],
                        "label-bold": ["Inter"],
                        "body-sm": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "headline-sm": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-caps": ["11px", { "lineHeight": "14px", "letterSpacing": "0.08em", "fontWeight": "600" }],
                        "headline-lg": ["30px", { "lineHeight": "38px", "letterSpacing": "-0.02em", "fontWeight": "700" }],

                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }]

<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>
</head>
<body class="bg-[#1E2A4A] h-screen flex flex-col justify-center items-center relative overflow-hidden font-body-md text-on-surface">
<!-- Background Gradient Effect -->
<div class="absolute inset-0 z-0 bg-gradient-to-br from-[#1E2A4A] to-[#131b2f] opacity-90 pointer-events-none"></div>
<main class="z-10 w-full max-w-md px-margin-mobile md:px-0">
<!-- Logo & Branding -->
<div class="text-center mb-8">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-surface shadow-md mb-4 border border-outline-variant">
<span class="material-symbols-outlined text-primary-container text-[32px]" data-icon="visibility" data-weight="fill" style="font-variation-settings: 'FILL' 1;">visibility</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-surface mb-2">RetiVue</h1>
<p class="font-body-sm text-body-sm text-secondary-fixed-dim">AI-Assisted Retinal Screening Platform</p>
</div>
<!-- Login Card -->
<div class="bg-surface rounded-xl shadow-[0px_8px_16px_rgba(29,36,89,0.12)] border border-outline-variant/30 p-8 w-full backdrop-blur-sm">
<form action="#" class="space-y-6" method="POST">
<!-- Email/Username Input -->
<div>
<label class="block font-label-bold text-label-bold text-on-surface-variant mb-2" for="email">Email or Username</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="person">person</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg focus:ring-primary-container focus:border-primary-container font-body-md text-body-md text-on-surface bg-surface placeholder-outline/60" id="email" name="email" placeholder="doctor@clinic.com" required="" type="text"/>
</div>
</div>
<!-- Password Input -->
<div>
<label class="block font-label-bold text-label-bold text-on-surface-variant mb-2" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-2 border border-outline-variant rounded-lg focus:ring-primary-container focus:border-primary-container font-body-md text-body-md text-on-surface bg-surface placeholder-outline/60" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<div class="absolute inset-y-0 right-0 pr-3 flex items-center">
<button aria-label="Toggle password visibility" class="text-outline hover:text-on-surface-variant focus:outline-none" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
</div>
<!-- Sign In Button -->
<button class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm font-label-bold text-label-bold text-on-primary bg-primary-container hover:bg-surface-tint focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-container transition-colors duration-200" type="submit">
                    Sign In
                </button>
<div class="text-center pt-2">
<p class="font-body-sm text-body-sm text-status-warning flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-[16px]" data-icon="warning">warning</span>
                        Authorized medical personnel only
                    </p>
</div>
</form>
</div>
<!-- Footer Info -->
<div class="text-center mt-8">
<p class="font-label-caps text-label-caps text-secondary-fixed-dim/70 tracking-widest">
                RETIVUE V2.0 · POWERED BY SWINV2 AI MODEL
            </p>
</div>
</main>
</body></html>
